name: Download and Create Artifacts

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
    
    - name: Create download directory
      run: mkdir -p downloads
    
    - name: Download files from links
      run: |
        # Limpiar y procesar cada línea
        while IFS= read -r line || [ -n "$line" ]; do
          # Limpiar la línea: eliminar BOM, retornos, espacios, comillas y comas
          url=$(echo "$line" | \
            tr -d '\r' | \
            sed '1s/^\xEF\xBB\xBF//' | \
            sed 's/^[[:space:]]*"*//' | \
            sed 's/"*[[:space:]]*$//' | \
            sed 's/^[[:space:]]*//' | \
            sed 's/[[:space:]]*$//' | \
            sed 's/,$//')
          
          # Saltar líneas vacías y comentarios
          if [[ -z "$url" || "$url" =~ ^[[:space:]]*# ]]; then
            continue
          fi
          
          filename=$(basename "$url")
          echo "Descargando: $url → $filename"
          
          if curl -L --fail --progress-bar -o "downloads/$filename" "$url"; then
            echo "✅ Descargado: $filename"
          else
            echo "❌ Error descargando: $url"
          fi
        done < links.txt
        
        echo ""
        echo "📦 Archivos descargados:"
        ls -la downloads/
    
    - name: Upload all artifacts
      uses: actions/upload-artifact@v4
      with:
        name: downloaded-files
        path: downloads/
        if-no-files-found: error
